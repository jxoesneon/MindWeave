name: mindweave
description: "A binaural beats meditation app with health integration and music mixing"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter

  # Core UI & Framework
  cupertino_icons: ^1.0.9
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.2
  
  # Audio Engine
  flutter_soloud: ^3.5.4
  audio_session: ^0.2.3
  just_audio: ^0.10.5
  
  # Backend & Database
  supabase_flutter: ^2.12.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # State Management & Code Generation
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  
  # Storage & Utilities
  path_provider: ^2.1.5
  flutter_dotenv: ^6.0.0
  uuid: ^4.5.3
  shared_preferences: ^2.5.5
  logging: ^1.3.0
  
  # Permissions & Platform Integration
  permission_handler: ^12.0.1
  
  # Analytics
  posthog_flutter: ^5.23.0
  
  # Health Integration
  health: ^13.3.1
  
  # Background & Notifications
  flutter_background_service: ^5.0.10
  flutter_local_notifications: ^21.0.0
  audio_service: ^0.18.15
  
  # Music Library Mixing
  on_audio_query: ^2.9.0
  
  # Monetization & Analytics
  in_app_purchase: ^3.2.3
  # PostHog disabled due to Kotlin 1.6 compatibility issues with Flutter 3.41+
  # posthog_flutter: ^4.11.0
  
  # Platform Integration
  share_plus: ^12.0.2
  url_launcher: ^6.3.1
  package_info_plus: ^9.0.0
  device_info_plus: ^12.4.0
  
  # Authentication
  google_sign_in: ^6.2.1
  
  # Security & Verification
  webview_flutter: ^4.8.0
  
  # UI & Accessibility
  sembast: ^3.7.5
  dynamic_color: ^1.7.0
  
  # Remote Config
  firebase_core: ^4.6.0
  firebase_remote_config: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.0
  fake_async: ^1.3.1
  integration_test:
    sdk: flutter
  # NOTE: build_runner removed due to riverpod version conflicts
  # Code generation is done manually for now

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/app/
    - assets/audio/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
